name: CD - GCP Virtual Machine (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      project_id:
        description: GCP project ID
        required: true
        type: string
      region:
        description: "GCP region (Free Tier: us-west1, us-central1, us-east1)"
        required: true
        type: string
        default: us-central1
      zone:
        description: GCP zone
        required: true
        type: string
        default: us-central1-a
      ssh_user:
        description: SSH username to create on the VM
        required: true
        type: string
        default: gcp-user
      ssh_public_key:
        description: SSH public key content (e.g., ssh-rsa AAA...)
        required: true
        type: string

env: {}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="zone=${{ github.event.inputs.zone }}" \
            -var="ssh_user=${{ github.event.inputs.ssh_user }}" \
            -var="ssh_public_key=${{ github.event.inputs.ssh_public_key }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="zone=${{ github.event.inputs.zone }}" \
            -var="ssh_user=${{ github.event.inputs.ssh_user }}" \
            -var="ssh_public_key=${{ github.event.inputs.ssh_public_key }}"
